<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Stock - Mercado Americano</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-weight: 800; color: var(--accent-color); margin-bottom: 30px; text-shadow: 0 0 20px rgba(56, 189, 248, 0.3); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent-color); }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .available { background: rgba(34, 197, 94, 0.2); color: var(--success); border: 1px solid var(--success); }
        .unavailable { background: rgba(239, 68, 68, 0.2); color: var(--error); border: 1px solid var(--error); }
        .checking { background: rgba(255, 255, 255, 0.1); color: #94a3b8; border: 1px solid #94a3b8; }

        .btn-link {
            display: block;
            margin-top: 15px;
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* Estilo para las campanas de notificación */
        .bell-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 10px;
            filter: grayscale(1);
            transition: 0.3s;
        }
        .bell-active { filter: grayscale(0) drop-shadow(0 0 5px gold); }
    </style>
</head>
<body>

    <h1>MERCADO AMERICANO MONITOR</h1>
    
    <div class="grid" id="product-grid">
        </div>

    <script type="module">
        // IMPORTANTE: Asegúrate de que tus credenciales de Firebase estén aquí
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            // PEGA AQUÍ TUS DATOS DE CONFIGURACIÓN (apiKey, authDomain, etc.)
            // Los sacas de la Consola de Firebase -> Configuración del proyecto
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const PRODUCTS = [
            {id:"parka", name:"Parka Corriente"},
            {id:"jeans", name:"Blue Jeans"},
            {id:"casaca", name:"Casaca Corriente"},
            {id:"buzo", name:"Buzo Corriente"},
            {id:"poleron", name:"Polerón Canguro"},
            {id:"paso", name:"Paso Corriente"},
            {id:"polera", name:"Polera Manga Larga"},
            {id:"sweater", name:"Sweater Algodón"},
            {id:"camisa", name:"Camisa Manga Larga"},
            {id:"franela", name:"Camisa Franela"},
            {id:"blusa", name:"Blusa Manga Larga"},
            {id:"polcorta", name:"Polera Manga Corta"},
            {id:"polpolar", name:"Polerón Polar"}
        ];

        const grid = document.getElementById('product-grid');

        // 1. Crear las tarjetas visuales
        PRODUCTS.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${p.id}`;
            card.innerHTML = `
                <h3>${p.name}</h3>
                <span class="status-badge checking">Cargando...</span>
                <button class="bell-btn" onclick="toggleAlert('${p.id}')" id="bell-${p.id}">🔔</button>
            `;
            grid.appendChild(card);
        });

        // 2. ESCUCHAR FIREBASE (La clave del éxito)
        // Ya no usamos fetch, solo esperamos los datos del bot de Python
        onSnapshot(doc(db, "config", "shared"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const stocks = data.estados_stock || {};
                const alerts = data.alerts || {};

                console.log("Datos recibidos:", stocks);

                Object.keys(stocks).forEach(id => {
                    const card = document.getElementById(`card-${id}`);
                    if (card) {
                        const badge = card.querySelector('.status-badge');
                        const isAvailable = stocks[id] === "available";
                        
                        badge.textContent = isAvailable ? "EN STOCK" : "AGOTADO";
                        badge.className = `status-badge ${isAvailable ? 'available' : 'unavailable'}`;
                    }
                });

                // Actualizar visualmente las campanas
                Object.keys(alerts).forEach(id => {
                    const bell = document.getElementById(`bell-${id}`);
                    if (bell) {
                        if (alerts[id]) bell.classList.add('bell-active');
                        else bell.classList.remove('bell-active');
                    }
                });
            }
        });

        // 3. Función para activar/desactivar alertas
        window.toggleAlert = async (id) => {
            const docRef = doc(db, "config", "shared");
            const bell = document.getElementById(`bell-${id}`);
            const isActive = bell.classList.contains('bell-active');
            
            const updatePath = {};
            updatePath[`alerts.${id}`] = !isActive;
            
            await updateDoc(docRef, updatePath);
        };
    </script>
</body>
</html>
