name: Monitor Stock Mercado Americano

on:
  schedule:
    - cron: '*/5 * * * *' # Frecuencia máxima permitida por GitHub
  workflow_dispatch: 

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Librerias
        run: pip install firebase-admin requests

      - name: Ejecutar Monitor (Rafaga Doble)
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python monitor.py
          echo "Esperando 30 segundos para la segunda revisión..."
          sleep 30
          python monitor.py
