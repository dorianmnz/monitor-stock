name: Monitor Mercado Americano

on:
  schedule:
    # Se ejecuta cada 6 minutos (12:00 a 23:54 UTC)
    - cron: '*/6 12-23 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests firebase-admin

      - name: Ejecutar monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        # El script tiene un loop interno de 5 minutos
        run: python monitor.py
